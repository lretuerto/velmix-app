name: Tests

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Validate Composer manifest
        run: composer validate --no-check-publish

      - name: Run Velmix QA
        run: composer run velmix:qa

      - name: Run readiness checks
        run: composer run velmix:readiness

      - name: Run outbox worker smoke
        run: composer run velmix:outbox

      - name: Run reconciliation smoke
        run: composer run velmix:reconcile
