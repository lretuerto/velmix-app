name: Evidence Governed Deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment for the controlled deployment gate
        required: true
        type: choice
        options:
          - staging
          - production
      release_identifier:
        description: Release identifier to certify
        required: true
        type: string
      deploy_evidence:
        description: Deploy evidence URL, ticket, or artifact reference
        required: true
        type: string
      rollback_evidence:
        description: Rollback evidence URL, ticket, or procedure reference
        required: true
        type: string
      approval_evidence:
        description: Promotion approval evidence URL or ticket
        required: true
        type: string
      cutover_evidence:
        description: Cutover evidence URL, ticket, or change record
        required: true
        type: string
      backup_artifact:
        description: Backup artifact identifier used for this change window
        required: true
        type: string
      restore_evidence:
        description: Restore or restore-drill evidence for the chosen backup
        required: true
        type: string
      smoke_evidence:
        description: Optional smoke evidence for staging validation
        required: false
        default: ''
        type: string
      monitoring_evidence:
        description: Optional monitoring evidence for cutover and operational certification
        required: false
        default: ''
        type: string
      operator:
        description: Operator or automation recording the evidence
        required: false
        default: release-bot
        type: string
      allow_warning:
        description: Allow warning overrides while still blocking on critical findings
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: evidence-governed-deploy-${{ github.ref_name }}-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  governed-deploy:
    name: Evidence Deploy ${{ inputs.target_environment }} / ${{ inputs.release_identifier }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target_environment }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: velmix
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_ENV: ${{ inputs.target_environment }}
      APP_DEBUG: false
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: velmix
      DB_USERNAME: root
      DB_PASSWORD: root
      VELMIX_APP_PATH: ${{ github.workspace }}
      VELMIX_APP_ROOT: ${{ github.workspace }}
      VELMIX_SHARED_PATH: ${{ github.workspace }}/storage/app/shared
      VELMIX_ENV_FILE: ${{ github.workspace }}/.env
      VELMIX_RELEASE_IDENTIFIER: ${{ inputs.release_identifier }}
      VELMIX_STAGING_CERTIFICATION_ENV: ${{ inputs.target_environment }}
      VELMIX_STAGING_CERTIFICATION_REQUIRED_ENVS: ${{ inputs.target_environment }}
      VELMIX_RELEASE_PROMOTION_ENV: ${{ inputs.target_environment }}
      VELMIX_RELEASE_PROMOTION_REQUIRED_ENVS: ${{ inputs.target_environment }}
      VELMIX_RELEASE_CUTOVER_ENV: ${{ inputs.target_environment }}
      VELMIX_RELEASE_CUTOVER_REQUIRED_ENVS: ${{ inputs.target_environment }}
      VELMIX_OPERATIONAL_CERTIFICATION_ENV: ${{ inputs.target_environment }}
      VELMIX_OPERATIONAL_CERTIFICATION_REQUIRED_ENVS: ${{ inputs.target_environment }}
      VELMIX_BACKUP_ENABLED: true
      VELMIX_BACKUP_ENCRYPTION_PASSPHRASE: workflow-evidence-passphrase
      VELMIX_ALERT_NOTIFY_CHANNELS: log
      VELMIX_DEPLOY_EVIDENCE_DIR: ${{ github.workspace }}/storage/app/evidence-governed-deploy
      VELMIX_DEPLOY_EVIDENCE: ${{ inputs.deploy_evidence }}
      VELMIX_ROLLBACK_EVIDENCE: ${{ inputs.rollback_evidence }}
      VELMIX_APPROVAL_EVIDENCE: ${{ inputs.approval_evidence }}
      VELMIX_CUTOVER_EVIDENCE: ${{ inputs.cutover_evidence }}
      VELMIX_BACKUP_ARTIFACT: ${{ inputs.backup_artifact }}
      VELMIX_RESTORE_EVIDENCE: ${{ inputs.restore_evidence }}
      VELMIX_SMOKE_EVIDENCE: ${{ inputs.smoke_evidence }}
      VELMIX_MONITORING_EVIDENCE: ${{ inputs.monitoring_evidence }}
      VELMIX_DEPLOY_OPERATOR: ${{ inputs.operator }}
      VELMIX_DEPLOY_ALLOW_WARNING: ${{ inputs.allow_warning }}
      VELMIX_DEPLOY_NOTES: GitHub Actions evidence-governed deployment workflow
      VELMIX_BACKUP_DRIVER: github-actions
      VELMIX_BACKUP_CHECKSUM: sha256:${{ github.sha }}
      VELMIX_BACKUP_SIZE: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if php -r 'try { new PDO("mysql:host=".getenv("DB_HOST").";port=".getenv("DB_PORT").";dbname=".getenv("DB_DATABASE"), getenv("DB_USERNAME"), getenv("DB_PASSWORD")); exit(0); } catch (Throwable $e) { fwrite(STDERR, $e->getMessage().PHP_EOL); exit(1); }'; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time." >&2
          exit 1

      - name: Bootstrap shared layout
        run: bash ops/scripts/bootstrap-shared-path.sh

      - name: Prepare controlled database state
        run: composer run velmix:reset

      - name: Validate scheduler and routes
        run: |
          composer run velmix:schedule
          composer run velmix:routes

      - name: Execute evidence-governed deployment chain
        run: bash ops/scripts/run-evidence-governed-deploy.sh

      - name: Publish job summary
        if: always()
        run: |
          if [ -f "$VELMIX_DEPLOY_EVIDENCE_DIR/summary.md" ]; then
            cat "$VELMIX_DEPLOY_EVIDENCE_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload deployment evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-governed-deploy-${{ inputs.target_environment }}-${{ inputs.release_identifier }}
          path: ${{ env.VELMIX_DEPLOY_EVIDENCE_DIR }}
          if-no-files-found: error
