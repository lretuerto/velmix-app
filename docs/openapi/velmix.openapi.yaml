components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
    laravelSession:
      type: apiKey
      in: cookie
      name: laravel_session
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-Id
      description: Header obligatorio en rutas multi-tenant.
  parameters:
    ReportDate:
      in: query
      name: date
      schema:
        type: string
        format: date
      required: false
      description: Fecha de corte en formato Y-m-d
    LotId:
      in: path
      name: lot
      required: true
      schema: { type: integer }
    SaleId:
      in: path
      name: sale
      required: true
      schema: { type: integer }
    CustomerId:
      in: path
      name: customer
      required: true
      schema: { type: integer }
    ReceivableId:
      in: path
      name: receivable
      required: true
      schema: { type: integer }
    PayableId:
      in: path
      name: payable
      required: true
      schema: { type: integer }
    ReceiptId:
      in: path
      name: receipt
      required: true
      schema: { type: integer }
    VoucherId:
      in: path
      name: voucher
      required: true
      schema: { type: integer }
    CreditNoteId:
      in: path
      name: creditNote
      required: true
      schema: { type: integer }
    OutboxEventId:
      in: path
      name: event
      required: true
      schema: { type: integer }
    ActivityId:
      in: path
      name: activity
      required: true
      schema: { type: integer }
    TokenId:
      in: path
      name: token
      required: true
      schema: { type: integer }
  responses:
    TenantRequired:
      description: Falta header X-Tenant-Id
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: Tenant context is required
    Forbidden:
      description: Usuario sin acceso o permiso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: Missing permission: reports.daily.read
    NotFound:
      description: Recurso no encontrado dentro del tenant
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: Voucher not found.
    ValidationError:
      description: Error de validacion o regla de negocio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
  schemas:
    DataEnvelope:
      type: object
      required: [data]
      properties:
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
    ErrorMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationError:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    ProductCreateRequest:
      type: object
      required: [sku, name, is_controlled]
      properties:
        sku: { type: string }
        name: { type: string }
        is_controlled: { type: boolean }
    LotCreateRequest:
      type: object
      required: [product_id, code, expires_at, stock_quantity]
      properties:
        product_id: { type: integer }
        code: { type: string }
        expires_at:
          type: string
          format: date
        stock_quantity:
          type: integer
          minimum: 0
    StockMovementCreateRequest:
      type: object
      required: [lot_id, type, quantity, reference]
      properties:
        lot_id: { type: integer }
        type: { type: string }
        quantity:
          type: integer
          minimum: 1
        reference: { type: string }
    SaleCreateRequest:
      type: object
      properties:
        payment_method:
          type: string
          enum: [cash, card, transfer, credit]
        customer_id: { type: integer }
        due_at:
          type: string
          format: date
        lot_id: { type: integer }
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: float
        prescription_code: { type: string }
        approval_code: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [quantity, unit_price]
            properties:
              lot_id: { type: integer }
              product_id: { type: integer }
              quantity:
                type: integer
                minimum: 1
              unit_price:
                type: number
                format: float
              prescription_code: { type: string }
              approval_code: { type: string }
    CustomerCreateRequest:
      type: object
      required: [document_type, document_number, name]
      properties:
        document_type: { type: string }
        document_number: { type: string }
        name: { type: string }
        phone: { type: string }
        email:
          type: string
          format: email
        credit_limit:
          type: number
          format: float
        credit_days:
          type: integer
          minimum: 0
        block_on_overdue: { type: boolean }
    CustomerUpdateRequest:
      type: object
      properties:
        document_type: { type: string }
        document_number: { type: string }
        name: { type: string }
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
          format: email
        credit_limit:
          type: [number, 'null']
        credit_days:
          type: [integer, 'null']
        block_on_overdue: { type: boolean }
        status:
          type: string
          enum: [active, inactive]
    ReceivablePaymentRequest:
      type: object
      required: [amount, payment_method, reference]
      properties:
        amount:
          type: number
          format: float
        payment_method: { type: string }
        reference: { type: string }
    FollowUpRequest:
      type: object
      required: [type, note]
      properties:
        type:
          type: string
          enum: [note, promise]
        note: { type: string }
        promised_amount:
          type: number
          format: float
        promised_at:
          type: string
          format: date
    CashCloseRequest:
      type: object
      properties:
        counted_amount:
          type: number
          format: float
        denominations:
          type: array
          items:
            type: object
            required: [value, quantity]
            properties:
              value:
                type: number
                format: float
              quantity:
                type: integer
                minimum: 1
    CashMovementCreateRequest:
      type: object
      required: [type, amount, reference]
      properties:
        type:
          type: string
          enum: [manual_in, manual_out]
        amount:
          type: number
          format: float
        reference: { type: string }
        notes: { type: string }
    SupplierCreateRequest:
      type: object
      required: [document_type, document_number, name]
      properties:
        document_type: { type: string }
        document_number: { type: string }
        name: { type: string }
        contact_name: { type: string }
        phone: { type: string }
        email:
          type: string
          format: email
    PurchaseOrderCreateRequest:
      type: object
      required: [supplier_id, items]
      properties:
        supplier_id: { type: integer }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, ordered_quantity, unit_cost]
            properties:
              product_id: { type: integer }
              ordered_quantity:
                type: integer
                minimum: 1
              unit_cost:
                type: number
                format: float
    PurchaseOrderFromReplenishmentRequest:
      type: object
      required: [supplier_id, items]
      properties:
        supplier_id: { type: integer }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, unit_cost]
            properties:
              product_id: { type: integer }
              unit_cost:
                type: number
                format: float
              suggested_order_quantity:
                type: integer
                minimum: 1
              order_quantity:
                type: integer
                minimum: 1
    PurchaseReceiptCreateRequest:
      type: object
      required: [supplier_id, items]
      properties:
        supplier_id: { type: integer }
        purchase_order_id: { type: integer }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [quantity, unit_cost]
            properties:
              lot_id: { type: integer }
              product_id: { type: integer }
              lot_code: { type: string }
              expires_at:
                type: string
                format: date
              quantity:
                type: integer
                minimum: 1
              unit_cost:
                type: number
                format: float
    PurchaseReturnCreateRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [purchase_receipt_item_id, quantity]
            properties:
              purchase_receipt_item_id: { type: integer }
              quantity:
                type: integer
                minimum: 1
    PayablePaymentRequest:
      type: object
      required: [amount, payment_method, reference]
      properties:
        amount:
          type: number
          format: float
        payment_method: { type: string }
        reference: { type: string }
    CreditNoteCreateRequest:
      type: object
      required: [sale_id, reason]
      properties:
        sale_id: { type: integer }
        reason: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sale_item_id, quantity]
            properties:
              sale_item_id: { type: integer }
              quantity:
                type: integer
                minimum: 1
    BillingProviderProfileUpdateRequest:
      type: object
      properties:
        provider_code:
          type: string
          enum: [fake_sunat]
        environment:
          type: string
          enum: [sandbox, live]
        default_outcome:
          type: string
          enum: [accepted, rejected, transient_fail]
        credentials:
          type: object
          additionalProperties: true
    ApiTokenCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        abilities:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date
