openapi: 3.1.0
info:
  title: VELMiX ERP API
  version: sprint1-day169
  description: |
    Contrato OpenAPI de endpoints prioritarios de VELMiX ERP.
    Cubre la convencion multi-tenant y los flujos criticos ya implementados.
    Para la superficie completa vigente usar `php artisan route:list --except-vendor`.
servers:
  - url: /
    description: Aplicacion Laravel local
tags:
  - name: Tenant
  - name: Inventory
  - name: POS
  - name: Sales
  - name: Cash
  - name: Purchasing
  - name: Billing
  - name: Reports
  - name: Audit
security:
  - bearerAuth: []
    tenantHeader: []
  - laravelSession: []
    tenantHeader: []
paths:
  /docs:
    get:
      tags: [Reports]
      security: []
      summary: Portal interno de documentacion
      responses:
        '200':
          description: Documentos disponibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /docs/openapi.yaml:
    get:
      tags: [Reports]
      security: []
      summary: Especificacion OpenAPI en YAML
      responses:
        '200':
          description: YAML bruto
          content:
            application/yaml:
              schema:
                type: string
  /auth/me:
    get:
      tags: [Tenant]
      summary: Resuelve el actor autenticado actual
      responses:
        '200':
          description: Usuario y tenant actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /auth/tokens:
    get:
      tags: [Tenant]
      summary: Lista tokens del usuario actual en el tenant
      security:
        - laravelSession: []
          tenantHeader: []
      responses:
        '200':
          description: Tokens del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Tenant]
      summary: Emite token API para el usuario actual
      security:
        - laravelSession: []
          tenantHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiTokenCreateRequest'
      responses:
        '200':
          description: Token creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /auth/tokens/{token}:
    delete:
      tags: [Tenant]
      summary: Revoca token API propio
      security:
        - laravelSession: []
          tenantHeader: []
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Token revocado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /tenant/ping:
    get:
      tags: [Tenant]
      summary: Verifica contexto tenant
      responses:
        '200':
          description: Contexto tenant resuelto
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  tenant:
                    type: integer
        '400':
          $ref: '#/components/responses/TenantRequired'
  /inventory/products:
    get:
      tags: [Inventory]
      summary: Lista productos del tenant
      responses:
        '200':
          description: Productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Inventory]
      summary: Crea producto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '200':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /inventory/lots:
    post:
      tags: [Inventory]
      summary: Crea lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LotCreateRequest'
      responses:
        '200':
          description: Lote creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /inventory/lots/{lot}:
    get:
      tags: [Inventory]
      summary: Lee detalle de lote
      parameters:
        - $ref: '#/components/parameters/LotId'
      responses:
        '200':
          description: Lote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /inventory/lots/{lot}/immobilize:
    post:
      tags: [Inventory]
      summary: Inmoviliza lote
      parameters:
        - $ref: '#/components/parameters/LotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Lote inmovilizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /inventory/movements:
    get:
      tags: [Inventory]
      summary: Lista movimientos de stock
      parameters:
        - in: query
          name: lot_id
          schema:
            type: integer
        - in: query
          name: product_id
          schema:
            type: integer
        - in: query
          name: type
          schema:
            type: string
      responses:
        '200':
          description: Movimientos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /stock/movements:
    post:
      tags: [Inventory]
      summary: Registra movimiento manual de stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockMovementCreateRequest'
      responses:
        '200':
          description: Movimiento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /pos/sales:
    get:
      tags: [POS]
      summary: Lista ventas del tenant
      responses:
        '200':
          description: Ventas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [POS]
      summary: Ejecuta venta POS
      description: |
        Soporta modo simple con `lot_id` y modo multi-item con `items[]`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaleCreateRequest'
            examples:
              multiItem:
                value:
                  payment_method: cash
                  items:
                    - product_id: 1
                      quantity: 2
                      unit_price: 4.5
                    - lot_id: 10
                      quantity: 1
                      unit_price: 9.9
      responses:
        '200':
          description: Venta registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /pos/sales/{sale}:
    get:
      tags: [POS]
      summary: Lee detalle de venta
      parameters:
        - $ref: '#/components/parameters/SaleId'
      responses:
        '200':
          description: Venta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /pos/sales/{sale}/cancel:
    post:
      tags: [POS]
      summary: Anula venta
      parameters:
        - $ref: '#/components/parameters/SaleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Venta anulada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/customers:
    get:
      tags: [Sales]
      summary: Lista clientes
      responses:
        '200':
          description: Clientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Sales]
      summary: Crea cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '200':
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/customers/{customer}:
    patch:
      tags: [Sales]
      summary: Actualiza cliente
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdateRequest'
      responses:
        '200':
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/customers/{customer}/statement:
    get:
      tags: [Sales]
      summary: Estado de cuenta del cliente
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Statement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/receivables:
    get:
      tags: [Sales]
      summary: Lista cuentas por cobrar
      responses:
        '200':
          description: Receivables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/receivables/{receivable}:
    get:
      tags: [Sales]
      summary: Detalle de cuenta por cobrar
      parameters:
        - $ref: '#/components/parameters/ReceivableId'
      responses:
        '200':
          description: Receivable detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/receivables/{receivable}/payments:
    post:
      tags: [Sales]
      summary: Registra cobranza
      parameters:
        - $ref: '#/components/parameters/ReceivableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceivablePaymentRequest'
      responses:
        '200':
          description: Cobranza registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /sales/receivables/{receivable}/follow-ups:
    get:
      tags: [Sales]
      summary: Historial de seguimiento
      parameters:
        - $ref: '#/components/parameters/ReceivableId'
      responses:
        '200':
          description: Follow ups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Sales]
      summary: Registra nota o promesa de cobro
      parameters:
        - $ref: '#/components/parameters/ReceivableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpRequest'
      responses:
        '200':
          description: Follow up creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /cash/sessions/open:
    post:
      tags: [Cash]
      summary: Abre caja
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [opening_amount]
              properties:
                opening_amount:
                  type: number
                  format: float
      responses:
        '200':
          description: Sesion abierta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /cash/sessions/current:
    get:
      tags: [Cash]
      summary: Lee caja activa
      responses:
        '200':
          description: Sesion actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /cash/sessions/current/close:
    post:
      tags: [Cash]
      summary: Cierra caja con monto o denominaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashCloseRequest'
      responses:
        '200':
          description: Sesion cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /cash/movements:
    post:
      tags: [Cash]
      summary: Registra ingreso o egreso manual de caja
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashMovementCreateRequest'
      responses:
        '200':
          description: Movimiento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/suppliers:
    get:
      tags: [Purchasing]
      summary: Lista proveedores
      responses:
        '200':
          description: Proveedores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Purchasing]
      summary: Crea proveedor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierCreateRequest'
      responses:
        '200':
          description: Proveedor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/orders:
    get:
      tags: [Purchasing]
      summary: Lista ordenes de compra
      responses:
        '200':
          description: Ordenes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Purchasing]
      summary: Crea orden de compra
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderCreateRequest'
      responses:
        '200':
          description: Orden creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/orders/from-replenishment:
    post:
      tags: [Purchasing]
      summary: Crea orden desde sugerencias de reposicion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderFromReplenishmentRequest'
      responses:
        '200':
          description: Orden creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/receipts:
    get:
      tags: [Purchasing]
      summary: Lista recepciones
      responses:
        '200':
          description: Recepciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Purchasing]
      summary: Registra recepcion de compra
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseReceiptCreateRequest'
      responses:
        '200':
          description: Recepcion registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/receipts/{receipt}/returns:
    post:
      tags: [Purchasing]
      summary: Registra devolucion a proveedor
      parameters:
        - $ref: '#/components/parameters/ReceiptId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseReturnCreateRequest'
      responses:
        '200':
          description: Devolucion registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/payables:
    get:
      tags: [Purchasing]
      summary: Lista cuentas por pagar
      responses:
        '200':
          description: Payables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/payables/{payable}/payments:
    post:
      tags: [Purchasing]
      summary: Registra pago a proveedor
      parameters:
        - $ref: '#/components/parameters/PayableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayablePaymentRequest'
      responses:
        '200':
          description: Pago registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /purchases/payables/{payable}/apply-credits:
    post:
      tags: [Purchasing]
      summary: Aplica creditos de proveedor a una deuda
      parameters:
        - $ref: '#/components/parameters/PayableId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  format: float
      responses:
        '200':
          description: Creditos aplicados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/vouchers:
    post:
      tags: [Billing]
      summary: Emite voucher interno desde venta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sale_id, type]
              properties:
                sale_id:
                  type: integer
                type:
                  type: string
                  example: boleta
      responses:
        '200':
          description: Voucher emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/vouchers/{voucher}:
    get:
      tags: [Billing]
      summary: Lee detalle de voucher
      parameters:
        - $ref: '#/components/parameters/VoucherId'
      responses:
        '200':
          description: Voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/vouchers/{voucher}/payloads:
    get:
      tags: [Billing]
      summary: Lista snapshots versionados de payload para un voucher
      parameters:
        - $ref: '#/components/parameters/VoucherId'
      responses:
        '200':
          description: Payloads del voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/vouchers/{voucher}/payloads/regenerate:
    post:
      tags: [Billing]
      summary: Regenera snapshots de payload para un voucher usando el provider profile actual
      parameters:
        - $ref: '#/components/parameters/VoucherId'
      responses:
        '200':
          description: Snapshot regenerado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/vouchers/{voucher}/replay:
    post:
      tags: [Billing]
      summary: Reencola un voucher con el ultimo snapshot disponible
      parameters:
        - $ref: '#/components/parameters/VoucherId'
      responses:
        '200':
          description: Replay programado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/credit-notes:
    post:
      tags: [Billing]
      summary: Emite nota de credito total o parcial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditNoteCreateRequest'
      responses:
        '200':
          description: Nota emitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/credit-notes/{creditNote}:
    get:
      tags: [Billing]
      summary: Lee detalle de nota de credito
      parameters:
        - $ref: '#/components/parameters/CreditNoteId'
      responses:
        '200':
          description: Nota de credito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/credit-notes/{creditNote}/payloads:
    get:
      tags: [Billing]
      summary: Lista snapshots versionados de payload para una nota de credito
      parameters:
        - $ref: '#/components/parameters/CreditNoteId'
      responses:
        '200':
          description: Payloads de la nota de credito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/credit-notes/{creditNote}/payloads/regenerate:
    post:
      tags: [Billing]
      summary: Regenera snapshots de payload para una nota de credito usando el provider profile actual
      parameters:
        - $ref: '#/components/parameters/CreditNoteId'
      responses:
        '200':
          description: Snapshot regenerado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/credit-notes/{creditNote}/replay:
    post:
      tags: [Billing]
      summary: Reencola una nota de credito con el ultimo snapshot disponible
      parameters:
        - $ref: '#/components/parameters/CreditNoteId'
      responses:
        '200':
          description: Replay programado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/outbox/dispatch:
    post:
      tags: [Billing]
      summary: Despacha eventos outbox usando el provider configurado del tenant
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                simulate_result:
                  type: string
                  enum: [accepted, rejected, transient_fail]
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Evento procesado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/provider-profile:
    get:
      tags: [Billing]
      summary: Lee el provider profile de billing del tenant
      responses:
        '200':
          description: Perfil de provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    put:
      tags: [Billing]
      summary: Actualiza el provider profile de billing del tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingProviderProfileUpdateRequest'
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/provider-profile/check:
    post:
      tags: [Billing]
      summary: Ejecuta health check del provider profile del tenant
      responses:
        '200':
          description: Snapshot de salud actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/outbox/provider-trace:
    get:
      tags: [Billing]
      summary: Lee trazabilidad de intentos por provider y environment
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Trazabilidad del provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/provider-metrics:
    get:
      tags: [Billing]
      summary: Lee SLA operativo del provider y del outbox de billing
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 30
        - in: query
          name: recent_failures_limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Metricas operativas del provider billing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/outbox/summary:
    get:
      tags: [Billing]
      summary: Lee backlog y ultimo intento del outbox
      responses:
        '200':
          description: Summary del outbox
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
  /billing/outbox/{event}/retry:
    post:
      tags: [Billing]
      summary: Reintenta evento fallido
      parameters:
        - $ref: '#/components/parameters/OutboxEventId'
      responses:
        '200':
          description: Retry programado
          content:
            application/json:
              schema:
